<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page-title">时间天气仪表盘</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 语言切换按钮 -->
    <div class="language-toggle">
        <button class="lang-btn active" data-lang="zh" title="中文">🇨🇳</button>
        <button class="lang-btn" data-lang="en" title="English">🇬🇧</button>
    </div>

    <!-- 天气和时间显示区 -->
    <div class="dashboard-container">
        <div class="weather-time-section">
            <h1 class="app-title" data-i18n="app-title">全球时间与天气</h1>

            <!-- 所有城市卡片横向排列 -->
            <div class="cities-row">
            <!-- 当前城市卡片 - 居中大卡片 -->
            <div class="local-city-container">
                <div class="city-card city-card-large" id="local-card">
                    <div class="city-header">
                        <h2 class="city-name">
                            <span id="local-city-name" data-i18n="select-city">选择城市</span>
                            <button class="city-select-btn" id="select-city-btn">📍</button>
                        </h2>
                    </div>
                    <div class="timezone-display" id="local-timezone">UTC+8</div>
                    <div class="date-display" id="local-date">--</div>
                    <div class="time-display" id="local-time">--:--:--</div>
                    <div class="weather-info">
                        <div class="weather-icon" id="local-weather-icon">🌤️</div>
                        <div class="weather-details">
                            <div class="temperature" id="local-temp">--°C</div>
                            <div class="weather-desc" id="local-desc" data-i18n="loading">加载中...</div>
                        </div>
                    </div>
                    <div class="weather-stats">
                        <div class="stat">
                            <span class="stat-label" data-i18n="humidity">湿度</span>
                            <span class="stat-value" id="local-humidity">--%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label" data-i18n="air-quality">空气质量</span>
                            <span class="stat-value" id="local-aqi">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 其他城市卡片 - 按时区从早到晚排列 -->
            <div class="other-cities-container">
                <!-- 纽约卡片 (UTC-5) -->
                <div class="city-card city-card-small" id="newyork-card">
                    <div class="city-header">
                        <h3 class="city-name">New York · 纽约</h3>
                    </div>
                    <div class="timezone-display" id="newyork-timezone">UTC-5</div>
                    <div class="date-display" id="newyork-date">--</div>
                    <div class="time-display" id="newyork-time">--:--:--</div>
                    <div class="weather-info">
                        <div class="weather-icon" id="newyork-weather-icon">🌤️</div>
                        <div class="weather-details">
                            <div class="temperature" id="newyork-temp">--°C</div>
                            <div class="weather-desc" id="newyork-desc" data-i18n="loading">加载中...</div>
                        </div>
                    </div>
                    <div class="weather-stats">
                        <div class="stat">
                            <span class="stat-label" data-i18n="humidity">湿度</span>
                            <span class="stat-value" id="newyork-humidity">--%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label" data-i18n="air-quality">空气质量</span>
                            <span class="stat-value" id="newyork-aqi">--</span>
                        </div>
                    </div>
                </div>

                <!-- 巴黎卡片 (UTC+1) -->
                <div class="city-card city-card-small" id="paris-card">
                    <div class="city-header">
                        <h3 class="city-name">Paris · 巴黎</h3>
                    </div>
                    <div class="timezone-display" id="paris-timezone">UTC+1</div>
                    <div class="date-display" id="paris-date">--</div>
                    <div class="time-display" id="paris-time">--:--:--</div>
                    <div class="weather-info">
                        <div class="weather-icon" id="paris-weather-icon">🌤️</div>
                        <div class="weather-details">
                            <div class="temperature" id="paris-temp">--°C</div>
                            <div class="weather-desc" id="paris-desc" data-i18n="loading">加载中...</div>
                        </div>
                    </div>
                    <div class="weather-stats">
                        <div class="stat">
                            <span class="stat-label" data-i18n="humidity">湿度</span>
                            <span class="stat-value" id="paris-humidity">--%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label" data-i18n="air-quality">空气质量</span>
                            <span class="stat-value" id="paris-aqi">--</span>
                        </div>
                    </div>
                </div>

                <!-- 上海卡片 (UTC+8) -->
                <div class="city-card city-card-small" id="shanghai-card">
                    <div class="city-header">
                        <h3 class="city-name">Shanghai · 上海</h3>
                    </div>
                    <div class="timezone-display" id="shanghai-timezone">UTC+8</div>
                    <div class="date-display" id="shanghai-date">--</div>
                    <div class="time-display" id="shanghai-time">--:--:--</div>
                    <div class="weather-info">
                        <div class="weather-icon" id="shanghai-weather-icon">🌤️</div>
                        <div class="weather-details">
                            <div class="temperature" id="shanghai-temp">--°C</div>
                            <div class="weather-desc" id="shanghai-desc" data-i18n="loading">加载中...</div>
                        </div>
                    </div>
                    <div class="weather-stats">
                        <div class="stat">
                            <span class="stat-label" data-i18n="humidity">湿度</span>
                            <span class="stat-value" id="shanghai-humidity">--%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label" data-i18n="air-quality">空气质量</span>
                            <span class="stat-value" id="shanghai-aqi">--</span>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>

        <!-- 计时器区 -->
        <div class="timer-section">
            <h2 class="section-title" data-i18n="timer">计时器</h2>

            <div class="timer-controls-top">
                <div class="timer-mode">
                    <button class="mode-btn active" id="stopwatch-mode" data-i18n="stopwatch">正计时</button>
                    <button class="mode-btn" id="countdown-mode" data-i18n="countdown">倒计时</button>
                </div>

                <div class="countdown-input-group" id="countdown-input-group" style="display: none;">
                    <input type="number" id="hours-input" min="0" max="23" placeholder="0" value="0">
                    <span>:</span>
                    <input type="number" id="minutes-input" min="0" max="59" placeholder="0" value="0">
                    <span>:</span>
                    <input type="number" id="seconds-input" min="0" max="59" placeholder="0" value="0">
                </div>
            </div>

            <div class="timer-display" id="timer-display">00:00:00</div>

            <div class="timer-buttons">
                <button class="timer-btn start-btn" id="start-btn" data-i18n="start">开始</button>
                <button class="timer-btn pause-btn" id="pause-btn" disabled data-i18n="pause">暂停</button>
                <button class="timer-btn stop-btn" id="stop-btn" disabled data-i18n="stop">停止</button>
                <button class="timer-btn reset-btn" id="reset-btn" data-i18n="reset">重置</button>
                <button class="timer-btn lap-btn" id="lap-btn" disabled data-i18n="lap">计圈</button>
            </div>

            <div class="laps-container" id="laps-container">
                <h3 class="laps-title" data-i18n="lap-records">计圈记录</h3>
                <div class="laps-list" id="laps-list"></div>
            </div>
        </div>
    </div>

    <!-- 城市选择模态框 -->
    <div class="modal" id="city-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="select-city">选择城市</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="city-search" data-i18n-placeholder="search-city" placeholder="搜索城市...">

                <!-- 三级选择器 -->
                <div class="level-selectors">
                    <select id="continent-select" class="level-select">
                        <option value="" data-i18n="select-continent">选择洲</option>
                    </select>
                    <select id="country-select" class="level-select" disabled>
                        <option value="" data-i18n="select-country">选择国家</option>
                    </select>
                    <select id="city-select" class="level-select" disabled>
                        <option value="" data-i18n="select-city-option">选择城市</option>
                    </select>
                </div>

                <div class="city-suggestions" id="city-suggestions"></div>
            </div>
        </div>
    </div>

    <!-- 闪烁遮罩层 -->
    <div class="flash-overlay" id="flash-overlay"></div>

    <script src="translations.js"></script>
    <script src="cities-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
